# Production override для внешнего S3 (без MinIO).
# Медиа хранятся на S3 (например https://s3.twcstorage.ru).
# Используется вместе с docker-compose.s3-external.yml при заданном S3_ENDPOINT_URL в .env.

services:
  frontend:
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 96M

  api:
    environment:
      APP_ENV: prod
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://147.45.96.211}
      # Публичный URL бакета (для Timeweb: https://s3.twcstorage.ru/ИМЯ_БАКЕТА)
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 384M

  bot:
    environment:
      APP_ENV: prod
      # Бот качает медиа по API (относительные пути) или по полному S3 URL из БД, затем шлёт файлом
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-http://api:8000}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      UPLOAD_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M

  db:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 384M
