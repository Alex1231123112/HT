# Production override для внешнего S3 (без MinIO).
# Медиа хранятся на S3 (например https://s3.twcstorage.ru).
# Используется вместе с docker-compose.s3-external.yml при заданном S3_ENDPOINT_URL в .env.

services:
  frontend:
    ports:
      - "80:80"

  api:
    environment:
      APP_ENV: prod
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://147.45.96.211}
      # Публичный URL бакета (для Timeweb: https://s3.twcstorage.ru/ИМЯ_БАКЕТА)
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}

  bot:
    environment:
      APP_ENV: prod
      # Медиа с S3 — те же переменные, что у API (контент-план уже грузит фото по этому URL)
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      UPLOAD_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
