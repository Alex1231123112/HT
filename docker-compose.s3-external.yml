# Override для внешнего S3 (Timeweb Cloud, AWS и т.п.) вместо MinIO.
# Использование: docker compose -f docker-compose.yml -f docker-compose.s3-external.yml -f docker-compose.prod.yml up -d
#
# В .env задайте:
#   S3_ENDPOINT_URL=https://s3.twcstorage.ru
#   S3_BUCKET=your-bucket-name
#   S3_ACCESS_KEY_ID=...
#   S3_SECRET_ACCESS_KEY=...
#   S3_REGION=ru-1
#   S3_PUBLIC_BASE_URL=https://s3.twcstorage.ru/your-bucket-name

services:
  minio:
    profiles: ["minio"]

  minio-init:
    profiles: ["minio"]

  api:
    depends_on:
      db:
        condition: service_healthy
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-ru-1}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}

  bot:
    environment:
      UPLOAD_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
