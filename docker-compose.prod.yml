# Production override: порты, отключение консоли MinIO, prod-переменные
services:
  frontend:
    ports:
      - "80:80"

  minio:
    ports:
      - "9000:9000"
    # Порт 9001 (консоль MinIO) не пробрасываем — не открывать наружу

  api:
    environment:
      APP_ENV: prod
      # Set ALLOWED_ORIGINS in .env for your domain, e.g. ALLOWED_ORIGINS=http://147.45.96.211
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    # В prod можно убрать volume с исходниками — использовать только образ
    # volumes: []

  bot:
    environment:
      APP_ENV: prod
