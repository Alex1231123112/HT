# Production override: порты, лимиты CPU/памяти, prod-переменные
services:
  frontend:
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 96M

  minio:
    ports:
      - "9000:9000"
    # Порт 9001 (консоль MinIO) не пробрасываем — не открывать наружу
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M

  api:
    environment:
      APP_ENV: prod
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://147.45.96.211}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://147.45.96.211:9000/uploads}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  bot:
    environment:
      APP_ENV: prod
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-http://api:8000}
      UPLOAD_PUBLIC_BASE_URL: ${UPLOAD_PUBLIC_BASE_URL:-http://147.45.96.211:8000}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M

  db:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
